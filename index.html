<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Playlist Generator</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>AI Playlist Generator</h1>
        <p>노래를 입력하면 AI가 어울리는 15곡 플레이리스트를 만들고 유튜브 플레이리스트로 생성합니다.</p>
    </header>

    <div id="input-section">
        <div class="form-group">
            <label for="song-input">원하는 노래들 (여러 줄 가능)</label>
            <textarea id="song-input" placeholder="Love Poem - IU&#10;How can I love - AKMU&#10;You were beautiful - Day6"></textarea>
            <div class="hint">한 줄에 한 곡씩 (제목) - (가수) 형태로 입력해주세요.</div>
        </div>

        <div class="form-group">
            <label for="gemini-key">Gemini API Key</label>
            <input type="password" id="gemini-key" placeholder="AI-...">
        </div>

        <div class="form-group">
            <label for="google-client-id">Google OAuth Client ID</label>
            <input type="password" id="google-client-id" placeholder="123456789-abc.apps.googleusercontent.com">
            <div class="hint">YouTube Data API v3가 활성화된 데스크톱/웹 애플리케이션 Client ID를 입력하세요. (GCP 콘솔 필수 확인)</div>
        </div>

        <div id="error-msg" class="error-message"></div>

        <button id="generate-btn" onclick="initOAuthAndGenerate()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Google 인증 및 플레이리스트 생성
        </button>
    </div>

    <!-- Loading UI -->
    <div id="loading-section" class="loading-container">
        <div class="spinner"></div>
        <div id="loading-text" class="status-text">AI가 플레이리스트를 구성하는 중...</div>
    </div>

    <!-- Result UI -->
    <div id="result-section">
        <h2 class="result-title">✨ 생성된 플레이리스트</h2>
        
        <div class="playlist-box">
            <div id="song-list-container">
                <!-- Songs will be injected here -->
            </div>
        </div>

        <div class="youtube-link-box">
            <p style="margin:0; font-size:0.875rem; color:#166534; font-weight:600;">유튜브 플레이리스트 링크 (클릭 시 이동)</p>
            <a id="youtube-url" class="youtube-link-text" href="#" target="_blank">생성 중...</a>
        </div>

        <div class="button-group-row">
            <button onclick="copyPlaylist()" class="btn-outline">
                <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                텍스트 복사
            </button>
            <button onclick="resetApp()" class="btn-outline" style="color: var(--text-main); border-color: var(--border-color);">
                <svg class="icon" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                다시 생성
            </button>
        </div>
        <button id="open-youtube-btn" style="margin-top: 0.75rem;" onclick="openYoutube()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg>
            YouTube 재생목록 열기
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
